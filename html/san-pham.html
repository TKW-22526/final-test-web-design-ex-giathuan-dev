<!-- html/san-pham.html -->
<!DOCTYPE HTML>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương trình đào tạo - Trường Kỹ thuật và Công nghệ</title>
    <!-- GỌI CSS RIÊNG -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .program-card {
            background-color: #fff;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .program-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-light">

    <!-- Header Thanh Điều Hướng -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5" role="navigation">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">TRƯỜNG ĐẠI HỌC KỸ THUẬT VÀ CÔNG NGHỆ - ĐẠI HỌC TRÀ VINH</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="gioi-thieu.html">Giới thiệu</a>
                <a class="nav-link active" href="san-pham.html">Ngành học</a>
                <a class="nav-link" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="text-center fw-bold text-primary mb-2">CHƯƠNG TRÌNH ĐÀO TẠO</h1>
        <p class="text-center text-muted mb-5">Chọn ngành học phù hợp để định hình tương lai công nghệ của chính bạn</p>
        
        <!-- Khung chứa danh sách ngành được render tự động -->
        <div class="row g-4" id="productlist"></div>
    </div>

    <!-- Script dữ liệu -->
    <script src="../js/script.js"></script>
    <script>
        const container = document.getElementById("productlist");
    
        productlistt.forEach(obj => {
            // Tạo cột Bootstrap
            const col = document.createElement("div");
            col.className = "col-12 col-md-6 col-lg-3";

            const card = document.createElement("div");
            card.className = "program-card";

            const img = document.createElement("img");
            img.src = obj.image; 
            img.alt = obj.name;
            img.className = "img-fluid rounded mb-3 object-fit-cover";
            img.style.height = "160px";

            const title = document.createElement("h5");
            title.textContent = obj.name;
            title.style.fontSize = "1.05rem";
            title.style.fontWeight = "700";
            title.className = "text-dark mb-2";

            const badge = document.createElement("div");
            badge.className = "badge bg-danger mb-3 py-2 px-3 text-uppercase";
            badge.style.fontSize = "0.75rem";
            badge.textContent = obj.price; // Đóng vai trò là thông tin điểm nhấn của ngành

            const btn = document.createElement("a");
            btn.className = "btn btn-primary w-100 rounded-pill py-2 fw-semibold";
            btn.href = "chi-tiet.html?masp=" + obj.id; 
            btn.textContent = "Xem chi tiết";

            card.appendChild(img);
            card.appendChild(title);
            card.appendChild(badge);
            card.appendChild(btn);

            col.appendChild(card);
            container.appendChild(col);
        });
    </script>

    <!-- Footer -->
    <footer class="bg-dark text-muted py-4 mt-5 text-center">
        <div class="container">
            <p class="mb-0">© 2026 Trường Kỹ thuật và Công nghệ - Đại học Trà Vinh. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
