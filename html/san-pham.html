<!DOCTYPE HTML>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <!-- GỌI CSS RIÊNG: Nhảy ra ngoài thư mục html để vào thư mục css -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <h1 style="text-align: center;" class="mt-4">Danh sách sản phẩm</h1>
    
    <!-- Vùng tự động render danh sách bằng Javascript -->
    <div id="productlist"></div>

    <!-- GỌI DATA: Nhảy ra ngoài để vào thư mục js -->
    <script src="../js/script.js"></script>
    <script>
        const container = document.getElementById("productlist");
    
        productlistt.forEach(obj => {
            const card = document.createElement("div");
            card.className = "product-card";

            const img = document.createElement("img");
            img.src = obj.image; 
            img.alt = obj.name;

            const title = document.createElement("h3");
            title.textContent = obj.name;

            const price = document.createElement("div");
            price.className = "product-price";
            price.textContent = "Giá: " + obj.price;

            // LIÊN KẾT: Gọi trực tiếp sang chi-tiet.html cùng cấp và đính kèm id
            const btn = document.createElement("a");
            btn.className = "btn-detail";
            btn.href = "chi-tiet.html?masp=" + obj.id; 
            btn.textContent = "Xem chi tiết";

            card.appendChild(img);
            card.appendChild(title);
            card.appendChild(price);
            card.appendChild(btn);
            container.appendChild(card);
        });
    </script>
</body>
</html>
