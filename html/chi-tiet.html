<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm & Giỏ hàng</title>
    <!-- Gợi file CSS riêng -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Nhúng Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- Header Thanh Điều Hướng -->
    <div class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4" role="navigation">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Trang Chủ</a>
            <div class="navbar-nav">
                <a class="nav-link" href="gioi-thieu.html">Giới thiệu</a>
                <a class="nav-link" href="san-pham.html">Sản phẩm</a>
                <a class="nav-link" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Nút quay lại -->
        <div class="mb-4">
            <a href="san-pham.html" class="btn btn-outline-secondary rounded-pill">← Quay lại danh sách</a>
        </div>

        <!-- KHU VỰC 1: CHI TIẾT SẢN PHẨM ĐƯỢC BẤM VÀO XEM -->
        <div class="row align-items-center bg-white p-4 rounded-4 shadow-sm mb-5">
            <div class="col-md-6 text-center">
                <img src="" alt="" id="image" class="img-fluid rounded shadow-sm object-fit-contain" style="max-height: 350px;">
            </div>
            
            <div class="col-md-6">
                <h2 id="name" class="fw-bold text-dark mb-3">Tên sản phẩm: </h2>
                <div class="mb-3 d-flex align-items-center gap-3">
                    <span id="price" class="badge bg-danger fs-5 px-3 py-2" style="border-radius: 8px;">Giá: </span>
                </div>
                <p id="description" class="mt-3 text-muted lead" style="font-size: 1.05rem; line-height: 1.6;">Mô tả: </p>
                <div class="mt-4">
                    <button class="btn btn-primary px-4 py-2" style="border-radius: 15px;">Mua ngay</button>
                    <!-- SỰ KIỆN: Thêm vào giỏ thực tế -->
                    <button class="btn btn-warning text-white px-4 py-2" style="border-radius: 15px;" onclick="addToCart()">Thêm vào giỏ hàng</button>
                </div>
            </div>
        </div>

        <!-- KHU VỰC 2: GIỎ HÀNG THỰC TẾ -->
        <div class="bg-white p-4 rounded-4 shadow-sm mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark mb-0">🛒 Giỏ Hàng Của Bạn (<span id="cart-count">0</span> mặt hàng)</h3>
                <button class="btn btn-sm btn-outline-danger" onclick="clearCart()">Xóa toàn bộ giỏ</button>
            </div>
            
            <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên loại sách</th>
                            <th>Đơn giá</th>
                            <th style="width: 100px;" class="text-center">Số lượng</th>
                            <th>Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body">
                        <!-- Chờ Javascript đổ sản phẩm thực tế vào -->
                    </tbody>
                </table>
            </div>

            <!-- Khung Tổng Tiền Giỏ Hàng -->
            <div class="text-end mt-4">
                <h4 class="fw-bold text-danger">Tổng cộng giỏ hàng: <span id="cart-total-price">0đ</span></h4>
                <button class="btn btn-success px-5 py-2 mt-2" style="border-radius: 12px; font-weight: 600;">Tiến hành thanh toán</button>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // --- CHỨC NĂNG 1: HIỂN THỊ CHI TIẾT SẢN PHẨM ---
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('masp'); 

        let found = productlistt.find(item => item.id === productId);

        if (found) {
            document.getElementById("name").innerHTML = found.name;
            document.getElementById("price").innerHTML = "Giá: " + found.price;
            document.getElementById("description").innerHTML = "Mô tả: " + found.description;
            document.getElementById("image").src = found.image; 
            document.getElementById("image").alt = found.name;
        } else {
            document.getElementById("name").innerHTML = "Không tìm thấy thông tin sản phẩm!";
            document.getElementById("price").style.display = "none";
            document.getElementById("image").style.display = "none";
        }

        // --- CHỨC NĂNG 2: QUẢN LÝ VÀ ĐỔ GIỎ HÀNG THỰC TẾ PHÍA DƯỚI ---
        
        // Lấy giỏ hàng từ localStorage (nếu chưa có thì tạo mảng rỗng)
        function getCart() {
            return JSON.parse(localStorage.getItem('realCart')) || [];
        }

        // Hàm click Thêm vào giỏ
        function addToCart() {
            if (!found) return;
            
            let cart = getCart();
            let existingItem = cart.find(item => item.id === found.id);
            
            // Chuyển đổi chuỗi giá từ "135k" thành số 135000 để tính toán
            let numericPrice = parseInt(found.price) * 1000;

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: found.id,
                    name: found.name,
                    price: numericPrice,
                    quantity: 1,
                    image: found.image
                });
            }
            
            localStorage.setItem('realCart', JSON.stringify(cart));
            alert(`Đã thêm sách "${found.name}" vào giỏ hàng thành công!`);
            renderCart(); // Cập nhật lại giao diện bảng bên dưới
        }

        // Hàm render giao diện bảng giỏ hàng
        function renderCart() {
            const cartTableBody = document.getElementById("cart-table-body");
            cartTableBody.innerHTML = ""; // Xóa trắng để vẽ lại
            
            let cart = getCart();
            let totalCartMoney = 0;

            document.getElementById("cart-count").innerText = cart.length;

            if (cart.length === 0) {
                cartTableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Giỏ hàng trống. Hãy chọn sản phẩm và bấm thêm vào giỏ!</td></tr>`;
                document.getElementById("cart-total-price").innerText = "0 đ";
                return;
            }

            cart.forEach(item => {
                const lineTotal = item.price * item.quantity;
                totalCartMoney += lineTotal;

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><img src="${item.image}" alt="${item.name}" class="rounded" style="width: 50px; height: 50px; object-fit: cover;"></td>
                    <td class="fw-semibold text-dark">${item.name}</td>
                    <td class="text-secondary">${item.price.toLocaleString('vi-VN')} đ</td>
                    <td class="text-center fw-bold">${item.quantity}</td>
                    <td class="text-danger fw-bold">${lineTotal.toLocaleString('vi-VN')} đ</td>
                `;
                cartTableBody.appendChild(tr);
            });

            document.getElementById("cart-total-price").innerText = totalCartMoney.toLocaleString('vi-VN') + " đ";
        }

        // Hàm xóa toàn bộ giỏ
        function clearCart() {
            if(confirm("Bạn có chắc chắn muốn xóa toàn bộ giỏ hàng?")) {
                localStorage.removeItem('realCart');
                renderCart();
            }
        }

        // Tự động chạy hiển thị giỏ hàng khi vừa tải trang xong
        renderCart();
    </script>
</body>
</html>
