<!DOCTYPE HTML>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên hệ</title>
    <!-- Đi ngược ra ngoài thư mục html để liên kết file CSS riêng -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- Thanh Menu Điều Hướng Chung (Nằm cùng cấp trong thư mục html) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Trang Chủ</a>
            <div class="navbar-nav">
                <a class="nav-link" href="gioi-thieu.html">Giới thiệu</a>
                <a class="nav-link" href="san-pham.html">Sản phẩm</a>
                <a class="nav-link active" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row g-4">
            
            <!-- Cột thông tin liên hệ -->
            <div class="col-md-5">
                <div class="bg-white p-4 rounded-4 shadow-sm h-100">
                    <h2 class="fw-bold text-dark mb-4">Thông tin liên hệ</h2>
                    <p class="text-muted mb-3"><strong>📍 Địa chỉ:</strong> 123 Đường Nguyễn Trãi, Quận 1, TP. Hồ Chí Minh</p>
                    <p class="text-muted mb-3"><strong>📞 Hotline:</strong> 0123.456.789</p>
                    <p class="text-muted mb-3"><strong>✉️ Email:</strong> hotro@monhoc.com</p>
                    <p class="text-muted"><strong>⏰ Thời gian làm việc:</strong> 8:00 - 17:30 (Thứ 2 - Thứ 7)</p>
                </div>
            </div>
            
            <!-- Cột Form gửi lời nhắn -->
            <div class="col-md-7">
                <div class="bg-white p-4 rounded-4 shadow-sm h-100">
                    <h2 class="fw-bold text-dark mb-4">Gửi lời nhắn cho chúng tôi</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted">Họ và tên</label>
                            <input type="text" class="form-control" placeholder="Nhập họ và tên của bạn..." required style="border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted">Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required style="border-radius: 8px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted">Nội dung tin nhắn</label>
                            <textarea class="form-control" rows="4" placeholder="Nhập nội dung bạn cần hỗ trợ..." required style="border-radius: 8px;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 12px; font-weight: 500;">Gửi liên hệ</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
