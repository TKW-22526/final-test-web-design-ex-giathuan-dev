<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <!-- GỌI CSS RIÊNG: Nhảy ra ngoài thư mục html để vào thư mục css -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="mb-4">
            <!-- Quay trở lại trang danh sách nằm cùng cấp trong thư mục html/ -->
            <a href="san-pham.html" class="btn btn-outline-secondary rounded-pill">← Quay lại danh sách</a>
        </div>

        <div class="row align-items-center detail-box">
            
            <div class="col-md-6 text-center">
                <img src="" alt="" id="image" class="img-fluid rounded shadow-sm object-fit-contain" style="max-height: 400px;">
            </div>
            
            <div class="col-md-6">
                <h2 id="name" class="fw-bold text-dark mb-3">Tên sản phẩm: </h2>
                
                <div class="mb-3">
                    <span id="price" class="badge bg-danger fs-5 px-3 py-2" style="border-radius: 8px;">Giá: </span>
                </div>
                
                <p id="description" class="mt-3 text-muted lead" style="font-size: 1.05rem; line-height: 1.6;">Mô tả: </p>
                
                <div class="mt-4">
                    <a href="#" class="btn btn-primary btn-action">Mua ngay</a>
                    <a href="#" class="btn btn-warning btn-action text-white">Thêm vào giỏ hàng</a>
                </div>
            </div>

        </div>
    </div>

    <!-- GỌI DATA: Nhảy ra ngoài để vào thư mục js -->
    <script src="../js/script.js"></script>
    <script>
        // 1. Lấy mã sản phẩm từ URL gửi sang
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('masp'); 

        // 2. Tìm kiếm phần tử tương ứng trong mảng dữ liệu tiếng Anh (.id)
        let found = productlistt.find(item => item.id === productId);

        if (found) {
            // 3. Khớp và đổ các thuộc tính vào thẻ HTML tương ứng
            document.getElementById("name").innerHTML = "Môn học: " + found.name;
            document.getElementById("price").innerHTML = "Giá: " + found.price;
            document.getElementById("description").innerHTML = "Mô tả: " + found.description;
            document.getElementById("image").src = found.image; 
            document.getElementById("image").alt = found.name;
        } else {
            document.getElementById("name").innerHTML = "Không tìm thấy thông tin sản phẩm!";
            document.getElementById("price").style.display = "none";
            document.getElementById("image").style.display = "none";
        }
    </script>
</body>
</html>
